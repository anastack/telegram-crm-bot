<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header glass">
            <h1>CRM Admin</h1>
            <div class="user-info" id="user-info"></div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <!-- Dashboard Tab -->
            <section id="dashboard" class="tab-content active">
                <h2>Сводка</h2>
                <div class="stats-grid" id="stats-grid">
                    <div class="stat-card glass">
                        <h3>Записи</h3>
                        <p class="stat-value" id="stat-appointments">0</p>
                    </div>
                    <div class="stat-card glass">
                        <h3>Активные</h3>
                        <p class="stat-value" id="stat-active">0</p>
                    </div>
                    <div class="stat-card glass">
                        <h3>Клиенты</h3>
                        <p class="stat-value" id="stat-clients">0</p>
                    </div>
                </div>
            </section>

            <!-- Appointments Tab -->
            <section id="appointments" class="tab-content">
                <h2>Все записи</h2>
                <div class="appointments-list" id="appointments-list">
                    <!-- Загрузка данных... -->
                </div>
            </section>

            <!-- Clients Tab -->
            <section id="clients" class="tab-content">
                <h2>Клиенты</h2>
                <div class="search-bar">
                    <input type="text" id="client-search" placeholder="Поиск клиентов..." class="glass-input">
                </div>
                <div class="clients-list" id="clients-list">
                    <!-- Загрузка данных... -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass">
            <button class="nav-btn active" data-tab="dashboard">
                <span class="icon">📊</span>
                <span class="label">Сводка</span>
            </button>
            <button class="nav-btn" data-tab="appointments">
                <span class="icon">📅</span>
                <span class="label">Записи</span>
            </button>
            <button class="nav-btn" data-tab="clients">
                <span class="icon">👥</span>
                <span class="label">Клиенты</span>
            </button>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
